<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Racing Admin Demo</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    h2 {
      margin-top: 30px;
    }

    .section {
      padding: 20px;
    }

    .card {
      background: #1c1c1c;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 12px;
      border: 1px solid #2a2a2a;
    }

    button {
      background: #2a2a2a;
      color: white;
      border: none;
      padding: 12px 16px;
      margin: 6px 6px 6px 0;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #444;
    }

    input {
      padding: 10px;
      margin: 5px 5px 5px 0;
      border-radius: 6px;
      border: none;
      background: #222;
      color: white;
    }

    .big-button {
      width: 100%;
      padding: 18px;
      font-size: 16px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .horse-card {
      background: #141414;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
      border: 1px solid #333;
    }

    .odds-box {
      display: inline-block;
      background: #2a2a2a;
      padding: 8px 12px;
      border-radius: 6px;
      margin-right: 6px;
      font-weight: bold;
    }

  </style>
</head>
<body>

<div class="section">
  <h2>Sports</h2>
  <div id="sports"></div>
</div>

<div class="section">
  <h2>Countries</h2>
  <input id="newCountryName" placeholder="New Country Name">
  <button onclick="addCountry()">Add Country</button>
  <div id="countries"></div>
</div>

<div class="section">
  <h2>Courses</h2>
  <input id="newCourseName" placeholder="New Course Name">
  <button onclick="addCourse()">Add Course</button>
  <div id="courses"></div>
</div>

<div class="section">
  <h2>Race Days</h2>
  <input id="raceDate" type="date">
  <button onclick="addRaceDay()">Add Race Day</button>
  <div id="raceDays"></div>
</div>

<div class="section">
  <h2>Bulk Add Races</h2>
  <input id="raceCount" type="number" placeholder="Number of Races (e.g. 8)">
  <input id="startTime" type="datetime-local">
  <input id="intervalMins" type="number" placeholder="Interval (mins)">
  <button onclick="bulkAddRaces()">Add Races</button>
</div>

<div class="section">
  <h2>Races</h2>
  <div id="races"></div>
</div>

<div class="section">
  <h2>Add Horse</h2>
  <input id="horseNumber" type="number" placeholder="Horse Number">
  <input id="horseName" placeholder="Horse Name">
  <input id="horseInfo" placeholder="Horse Info (Jockey / Trainer / Weight)">
  <input id="winNum" type="number" placeholder="Win Odds">
  <input id="placeNum" type="number" placeholder="Place Odds">
  <button onclick="addHorse()">Add Horse</button>
</div>

<div class="section">
  <h2>Horses</h2>
  <div id="horses"></div>
</div>

<div class="section">
  <h2>Users</h2>
  <input id="userName" placeholder="User Name">
  <input id="userEmail" placeholder="User Email">
  <input id="userBalance" type="number" placeholder="Balance">
  <button onclick="addUser()">Add User</button>
  <div id="users"></div>
</div>

<script>

let selectedSport = null;
let selectedCountry = null;
let selectedCourse = null;
let selectedRaceDay = null;
let selectedRace = null;

const API = "/api/admin";

async function fetchJSON(url, options = {}) {
  const res = await fetch(url, {
    headers: { "Content-Type": "application/json" },
    ...options
  });
  return res.json();
}

async function loadSports() {
  const data = await fetchJSON(API + "/sports");
  const container = document.getElementById("sports");
  container.innerHTML = "";
  data.forEach(s => {
    const btn = document.createElement("button");
    btn.className = "big-button";
    btn.innerText = s.name;
    btn.onclick = () => {
      selectedSport = s.id;
      loadCountries();
    };
    container.appendChild(btn);
  });
}

async function loadCountries() {
  const data = await fetchJSON(API + "/sports/" + selectedSport + "/countries");
  const container = document.getElementById("countries");
  container.innerHTML = "";
  data.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "big-button";
    btn.innerText = c.name;
    btn.onclick = () => {
      selectedCountry = c.id;
      loadCourses();
    };
    container.appendChild(btn);
  });
}

async function loadCourses() {
  const data = await fetchJSON(API + "/countries/" + selectedCountry + "/courses");
  const container = document.getElementById("courses");
  container.innerHTML = "";
  data.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "big-button";
    btn.innerText = c.name;
    btn.onclick = () => {
      selectedCourse = c.id;
      loadRaceDays();
    };
    container.appendChild(btn);
  });
}

async function loadRaceDays() {
  const data = await fetchJSON(API + "/courses/" + selectedCourse + "/race-days");
  const container = document.getElementById("raceDays");
  container.innerHTML = "";
  data.forEach(rd => {
    const btn = document.createElement("button");
    btn.className = "big-button";
    btn.innerText = rd.race_date;
    btn.onclick = () => {
      selectedRaceDay = rd.id;
      loadRaces();
    };
    container.appendChild(btn);
  });
}

async function loadRaces() {
  const data = await fetchJSON(API + "/race-days/" + selectedRaceDay + "/races");
  const container = document.getElementById("races");
  container.innerHTML = "";
  data.forEach(r => {
    const btn = document.createElement("button");
    btn.className = "big-button";
    btn.innerText = "Race " + r.race_number + " - " + r.status;
    btn.onclick = () => {
      selectedRace = r.id;
      loadHorses();
    };
    container.appendChild(btn);
  });
}

async function loadHorses() {
  const data = await fetchJSON(API + "/races/" + selectedRace + "/horses");
  const container = document.getElementById("horses");
  container.innerHTML = "";
  data.forEach(h => {
    const div = document.createElement("div");
    div.className = "horse-card";
    div.innerHTML = `
      <strong>${h.horse_number}. ${h.name}</strong><br>
      <small>${h.info}</small><br>
      <span class="odds-box">Win: ${h.win_num}</span>
      <span class="odds-box">Place: ${h.place_num}</span>
    `;
    container.appendChild(div);
  });
}

async function addCountry() {
  const name = document.getElementById("newCountryName").value;
  await fetchJSON(API + "/sports/" + selectedSport + "/countries", {
    method: "POST",
    body: JSON.stringify({ name })
  });
  loadCountries();
}

async function addCourse() {
  const name = document.getElementById("newCourseName").value;
  await fetchJSON(API + "/countries/" + selectedCountry + "/courses", {
    method: "POST",
    body: JSON.stringify({ name })
  });
  loadCourses();
}

async function addRaceDay() {
  const race_date = document.getElementById("raceDate").value;
  await fetchJSON(API + "/courses/" + selectedCourse + "/race-days", {
    method: "POST",
    body: JSON.stringify({ race_date })
  });
  loadRaceDays();
}

async function bulkAddRaces() {
  const count = document.getElementById("raceCount").value;
  const startISO = document.getElementById("startTime").value;
  const intervalMins = document.getElementById("intervalMins").value;
  await fetchJSON(API + "/race-days/" + selectedRaceDay + "/races/bulk", {
    method: "POST",
    body: JSON.stringify({ count, startISO, intervalMins })
  });
  loadRaces();
}

async function addHorse() {
  const horse_number = document.getElementById("horseNumber").value;
  const name = document.getElementById("horseName").value;
  const info = document.getElementById("horseInfo").value;
  const win_num = document.getElementById("winNum").value;
  const place_num = document.getElementById("placeNum").value;

  await fetchJSON(API + "/races/" + selectedRace + "/horses", {
    method: "POST",
    body: JSON.stringify({
      horse_number,
      name,
      info,
      win_num,
      place_num
    })
  });

  loadHorses();
}

async function addUser() {
  const name = document.getElementById("userName").value;
  const email = document.getElementById("userEmail").value;
  const balance = document.getElementById("userBalance").value;

  await fetchJSON(API + "/users", {
    method: "POST",
    body: JSON.stringify({ name, email, balance })
  });

  loadUsers();
}

async function loadUsers() {
  const data = await fetchJSON(API + "/users");
  const container = document.getElementById("users");
  container.innerHTML = "";
  data.forEach(u => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      ${u.name} (${u.balance}) 
    `;
    container.appendChild(div);
  });
}

loadSports();
loadUsers();

</script>

</body>
</html>
